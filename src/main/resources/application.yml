server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        # Auth Service
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**

        # 2. User Service
        - id: user-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/users/**
          filters:
            # 방금 만든 JwtAuthenticationFilter의 앞부분 이름과 일치해야 해
            - JwtAuthenticationFilter

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000" # React 등 프론트엔드 주소 (나중에 실제 도메인으로 변경 가능)
              - "http://localhost:5173" # Vue, Vite 등 프론트엔드 주소
            allowedMethods: # 허용할 HTTP 메서드
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS # 사전 요청(Preflight)을 위해
            allowedHeaders: "*" # 모든 헤더(Authorization 등) 허용
            allowCredentials: true # 프론트엔드에서 쿠키나 인증 헤더(JWT)를 보낼 수 있게 허용 (중요)


jwt:
  # 반드시 Auth Service의 application.yml에 있는 값과 똑같은 문자열
  secret: my-super-secret-key-for-local-development-test-12345