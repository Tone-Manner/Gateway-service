server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        # Auth Service
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**

        # 2. User Service
        - id: user-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/users/**
          filters:
            # 방금 만든 JwtAuthenticationFilter의 앞부분 이름과 일치해야 해
            - JwtAuthenticationFilter



jwt:
  # 반드시 Auth Service의 application.yml에 있는 값과 똑같은 문자열
  secret: my-super-secret-key-for-local-development-test-12345